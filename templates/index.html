<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Animated background mesh -->
  <div class="bg-mesh" aria-hidden="true"></div>
  <div class="bg-noise" aria-hidden="true"></div>

  <div class="app">

    <!-- ── Header ────────────────────────────────────────────────── -->
    <header class="header">
      <div class="header__brand">
        <span class="header__icon" aria-hidden="true">&#9654;</span>
        <h1 class="header__title">YOUTUBE<span class="header__title--accent">DL</span></h1>
      </div>
      <div class="header__actions">
        <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">
          <svg class="theme-btn__icon" id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── API Key Input ─────────────────────────────────────────── -->
    <section class="card card--key anim-entry" aria-label="API Key">
      <div class="option-group">
        <span class="option-group__label">API Key</span>
        <input type="password" id="apiKeyInput" class="url-input" placeholder="Enter your API key" autocomplete="off" spellcheck="false">
      </div>
    </section>

    <!-- ── URL Input ─────────────────────────────────────────────── -->
    <section class="card card--url anim-entry" aria-label="URL del video">
      <div class="url-row">
        <input
          type="url" id="urlInput" class="url-input"
          placeholder="https://youtube.com/watch?v=..."
          aria-label="URL de YouTube" autocomplete="off" spellcheck="false"
        >
        <button class="btn btn--ghost" id="pasteBtn" aria-label="Pegar del portapapeles">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Pegar
        </button>
        <button class="btn btn--accent" id="infoBtn" aria-label="Obtener información">
          Info
        </button>
      </div>
    </section>

    <!-- ── Video Preview ─────────────────────────────────────────── -->
    <section class="card card--preview anim-entry" id="previewCard" hidden aria-label="Información del video">
      <div class="preview">
        <div class="preview__thumb-wrap">
          <img class="preview__thumb" id="previewThumb" alt="Miniatura" loading="lazy">
          <span class="preview__duration" id="previewDuration"></span>
        </div>
        <div class="preview__body">
          <h2 class="preview__title" id="previewTitle"></h2>
          <p class="preview__channel" id="previewChannel"></p>
          <p class="preview__meta" id="previewMeta"></p>
        </div>
      </div>
    </section>

    <!-- ── Loader (shown while fetching info) ────────────────────── -->
    <div class="loader" id="infoLoader" hidden aria-label="Cargando">
      <div class="loader__spinner"></div>
      <span class="loader__text">Obteniendo información…</span>
    </div>

    <!-- ── Format & Quality ──────────────────────────────────────── -->
    <section class="card card--options anim-entry" aria-label="Opciones de descarga">
      <div class="options-row">
        <div class="option-group">
          <span class="option-group__label">Formato</span>
          <div class="chip-group" id="formatChips" role="radiogroup" aria-label="Formato">
            <button class="chip chip--active" data-value="mp4" role="radio" aria-checked="true">
              <span class="chip__icon">&#127916;</span> MP4
            </button>
            <button class="chip" data-value="mp3" role="radio" aria-checked="false">
              <span class="chip__icon">&#127925;</span> MP3
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Download Button ───────────────────────────────────────── -->
    <button class="dl-btn anim-entry" id="downloadBtn" aria-label="Descargar">
      <span class="dl-btn__text" id="dlBtnText">&#11015; DESCARGAR</span>
      <span class="dl-btn__ripple" aria-hidden="true"></span>
    </button>

  </div>

  <!-- ── Toast container ─────────────────────────────────────────── -->
  <div class="toast-wrap" id="toasts" aria-live="polite"></div>

  <script src="/static/app.js"></script>
</body>
</html>
